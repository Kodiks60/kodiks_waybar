font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        12.0

cursor_trail 3
cursor_trail_decay 0.1 0.4

# Плавное мерцание курсора
cursor_blink yes
cursor_blink_interval 750
cursor_stop_blinking_after 15.0

cursor_shape beam
cursor_beam_thickness 2.0
cursor_color #e06c75

foreground              #cdd6f4
background              #1e1e2e
cursor                  #f5e0dc
selection_background    #585b70
selection_foreground    #cdd6f4

color0   #45475a
color1   #f38ba8
color2   #a6e3a1
color3   #f9e2af
color4   #89b4fa
color5   #cba6f7
color6   #94e2d5
color7   #bac2de
color8   #585b70
color9   #f38ba8
color10  #a6e3a1
color11  #f9e2af
color12  #89b4fa
color13  #cba6f7
color14  #94e2d5
color15  #a6adc8

background_opacity 0.92
dynamic_background_opacity yes


window_padding_width 10
window_border_width 1
window_border_color #313244
active_window_border_color #89b4fa
hide_window_decorations no

tab_bar_style powerline
tab_powerline_style slanted
tab_bar_edge bottom
tab_bar_min_tabs 1
tab_title_template "{title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}"

# Цвета вкладок
active_tab_foreground   #1e1e2e
active_tab_background   #89b4fa
active_tab_font_style   bold-italic
inactive_tab_foreground #cdd6f4
inactive_tab_background #313244

scrollback_lines 10000
mouse_hide_wait 3.0

copy_on_select yes
strip_trailing_spaces smart
allow_remote_control yes

term xterm-256color

map ctrl+shift+enter launch --location=hsplit
map ctrl+shift+backslash launch --location=vsplit

map ctrl+shift+w close_window
map ctrl+shift+q close_tab

map ctrl+shift+left neighboring_window left
map ctrl+shift+right neighboring_window right
map ctrl+shift+up neighboring_window up
map ctrl+shift+down neighboring_window down

map ctrl+shift+page_up previous_tab
map ctrl+shift+page_down next_tab
map ctrl+shift+t new_tab

map ctrl+shift+l next_layout

map ctrl+plus  change_font_size all +1.0
map ctrl+minus change_font_size all -1.0
map ctrl+0     change_font_size all 0

map ctrl+shift+f2 edit_config_file

map ctrl+shift+f5 load_config_file


allow_remote_control yes
listen_on unix:/tmp/kitty
